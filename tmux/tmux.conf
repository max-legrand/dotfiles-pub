# Vendored plugins and scripts live under ~/dotfiles-pub/tmux/.
# Symlink ~/.tmux.conf to this file (or point to it via -f).

# General settings
set -g allow-passthrough on
set-option -g automatic-rename off
setw -g xterm-keys on

set -g extended-keys on
set -g extended-keys-format csi-u
set -as terminal-features 'xterm*:extkeys'

set-window-option -g mode-keys vi
set -g status-keys vi

# Copy mode
bind-key v copy-mode
bind-key -T copy-mode-vi Escape send-keys -X cancel
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

# Smoother mouse scrolling (3 lines at a time)
bind -T copy-mode-vi WheelUpPane   select-pane \; send-keys -X -N 3 scroll-up
bind -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 3 scroll-down
bind -n WheelUpPane if-shell -F "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e; send-keys -X scroll-up'"

# Prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Remove the confirmation when closing pane
bind x kill-pane

set -sg escape-time 10
set -g history-limit 50000
set -g assume-paste-time 0
set -g mouse on

# Resize panes
bind-key -n M-C-h resize-pane -L
bind-key -n M-C-j resize-pane -D
bind-key -n M-C-k resize-pane -U
bind-key -n M-C-l resize-pane -R

# Floating popup tmux
bind-key -n C-f run-shell "~/dotfiles-pub/tmux/scripts/popuptmux.sh"

# Terminal overrides for true color
set-option -sa terminal-overrides ",xterm-256color:Tc"

# Base index settings
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1

# Split window bindings
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"

# Dracula theme — local-only plugins (no network fetching)
set -g @dracula-time-format "%m/%d(%a) %-I:%M%p"
set -g @dracula-show-left-icon "session"
set -g @dracula-plugins "time"
set -g @dracula-show-powerline "false"
set -g @dracula-military-time "false"
set -g @dracula-color-light_purple "#cdc1ff"

# Vendored plugins (no TPM)
run-shell "~/dotfiles-pub/tmux/plugins/tmux-sensible/sensible.tmux"
run-shell "~/dotfiles-pub/tmux/plugins/tmux-yank/yank.tmux"
run-shell "~/dotfiles-pub/tmux/plugins/dracula/dracula.tmux"

# Zoom indicator — appended after the theme so it overrides status-left
set -ga status-left "#[fg=black,bg=yellow,bold]#{?window_zoomed_flag, Z ,}#[default]"

# Pane navigation with Ctrl + h/j/k/l
bind-key -n C-h select-pane -L
bind-key -n C-j select-pane -D
bind-key -n C-k select-pane -U
bind-key -n C-l select-pane -R

# Swap current pane with directional neighbor
bind-key -r h run-shell "~/dotfiles-pub/tmux/scripts/swap-pane.sh L"
bind-key -r j run-shell "~/dotfiles-pub/tmux/scripts/swap-pane.sh D"
bind-key -r k run-shell "~/dotfiles-pub/tmux/scripts/swap-pane.sh U"
bind-key -r l run-shell "~/dotfiles-pub/tmux/scripts/swap-pane.sh R"

unbind -n C-g

# Switch windows with Ctrl + q/e
bind -n C-q previous-window
bind -n C-e next-window

# Move current window to a specific index (prefix + M, then enter target index)
bind-key M command-prompt -p "move window to index:" "swap-window -t %%"

bind-key r command-prompt -p "rename-tab:" "rename-window %%"
bind-key R command-prompt -p "rename-session:" "rename-session %%"

# Auto-uppercase window and session names
set-hook -g after-rename-window "run-shell 'N=\"#{window_name}\"; U=\$(echo \"\$N\" | tr a-z A-Z); [ \"\$N\" != \"\$U\" ] && tmux rename-window \"\$U\"; true'"
set-hook -g after-rename-session "run-shell 'S=\"#{session_name}\"; U=\$(echo \"\$S\" | tr a-z A-Z); [ \"\$S\" != \"\$U\" ] && tmux rename-session \"\$U\"; true'"
set-hook -g after-new-session "run-shell 'S=\"#{session_name}\"; U=\$(echo \"\$S\" | tr a-z A-Z); [ \"\$S\" != \"\$U\" ] && tmux rename-session \"\$U\"; N=\"#{window_name}\"; W=\$(echo \"\$N\" | tr a-z A-Z); [ \"\$N\" != \"\$W\" ] && tmux rename-window \"\$W\"; true'"
set-hook -g after-new-window "run-shell 'N=\"#{window_name}\"; U=\$(echo \"\$N\" | tr a-z A-Z); [ \"\$N\" != \"\$U\" ] && tmux rename-window \"\$U\"; true'"

# Nudge current window left/right (prefix + < / >)
bind-key -r < swap-window -t -1 \; previous-window
bind-key -r > swap-window -t +1 \; next-window

# Toggle status bar
bind-key -n M-\; set status

# Enable Ctrl+Shift+V for pasting
bind-key -n C-S-V paste-buffer

# Capture scrollback to nvim
bind-key x run-shell "tmux capture-pane -S - -E - -p > /tmp/tmux-scrollback.txt" \; new-window "nvim /tmp/tmux-scrollback.txt"

# Popup styling
set -g popup-border-style "fg=#cdc1ff"
set -g popup-style "bg=default,fg=default"

# Hide / show panes
bind H run-shell "~/dotfiles-pub/tmux/scripts/hide-pane.sh"
bind J run-shell "~/dotfiles-pub/tmux/scripts/show-pane.sh"

# Session picker
bind-key S run-shell "~/dotfiles-pub/tmux/scripts/session-picker.sh"

# Clear-screen passthrough on alt key
bind-key -n C-\; send-keys C-l

# Quick window/pane lifecycle
bind-key t new-window
bind-key w kill-pane

# Cursor
set -g cursor-colour "#cdc1ff"
set -g cursor-style block
set -g prompt-cursor-colour "#cdc1ff"
